<template x-if="currentView === 'generator'">
    <div class="flex-1 flex overflow-hidden" x-init="$nextTick(() => scrollChat())">
        <section
            class="flex-1 h-full min-h-0 bg-surface-container-low flex flex-col border-l border-white/5 shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-white/5">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2.5">
                        <span class="material-symbols-outlined text-primary text-xl">auto_awesome</span>
                        <h3 class="font-headline font-bold text-indigo-50 color-indigo-50 text-base">AI Director</h3>
                    </div>
                    <!-- 容量状态徽章 -->
                    <template x-if="currentModelCapacity.limit > 0">
                        <span
                            class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-label uppercase tracking-wide"
                            :class="{
                                            'bg-emerald-500/15 text-emerald-400': currentModelCapacity.available && (currentModelCapacity.active / currentModelCapacity.limit) <= 0.7,
                                            'bg-amber-500/15 text-amber-300':  currentModelCapacity.available && (currentModelCapacity.active / currentModelCapacity.limit) > 0.7,
                                            'bg-red-500/15 text-red-400':      !currentModelCapacity.available
                                        }">
                            <span class="inline-block h-1.5 w-1.5 rounded-full" :class="{
                                                'bg-emerald-400 animate-pulse': currentModelCapacity.available && (currentModelCapacity.active / currentModelCapacity.limit) <= 0.7,
                                                'bg-amber-300 animate-pulse':  currentModelCapacity.available && (currentModelCapacity.active / currentModelCapacity.limit) > 0.7,
                                                'bg-red-400':                  !currentModelCapacity.available
                                            }"></span>
                            <span
                                x-text="currentModelCapacity.available ? (currentModelCapacity.active + '/' + currentModelCapacity.limit + ' 任务') : '队列已满'">
                            </span>
                        </span>
                    </template>
                </div>
                <p class="text-[13px] text-slate-400 font-body mt-1">输入描述，附加图片/视频/音频参考</p>
            </div>

            <div id="chatFeed" class="flex-1 overflow-y-auto p-5 space-y-3">

                <!-- 懒加载历史消息指示条 -->
                <template x-if="messagesLoadingMore">
                    <div class="flex justify-center py-2">
                        <span class="flex items-center gap-2 text-[11px] text-indigo-300 font-label animate-pulse">
                            <svg class="h-3 w-3 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="3"></circle>
                                <path class="opacity-80" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            加载历史消息...
                        </span>
                    </div>
                </template>
                <template x-if="!messagesHasMore && messages.length > 0 && !messagesLoadingMore">
                    <div class="flex justify-center py-1">
                        <span class="text-[10px] text-slate-600 font-label">— 已加载全部消息 —</span>
                    </div>
                </template>

                <div x-show="!currentConversation" class="flex flex-col items-center justify-center h-full gap-4">
                    <span class="material-symbols-outlined text-5xl text-slate-700">chat</span>
                    <p class="text-sm text-slate-500 font-label">创建或选择一个对话开始</p>
                </div>

                <template x-for="(msg, idx) in messages" :key="idx">
                    <div class="fade-in-up"
                        :class="msg.role === 'user' ? 'flex flex-col items-end' : 'flex flex-col items-start'">
                        <template x-if="msg.role === 'user'">
                            <div class="max-w-[85%] space-y-2">
                                <div
                                    class="relative group bg-surface-container-highest p-4 rounded-xl rounded-tr-none border-l-2 border-primary-container">
                                    <button @click="regenerateFromMessage(msg)" :disabled="generating"
                                        class="absolute bottom-2 right-2 h-6 w-6 rounded-md bg-primary/85 text-on-primary flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-primary transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                        title="使用这条 Prompt 重新生成">
                                        <span class="material-symbols-outlined text-[14px]">refresh</span>
                                    </button>
                                    <p class="text-sm text-indigo-100" x-text="msg.text"></p>
                                    <template x-if="msg.attachments?.length">
                                        <div class="mt-3 flex flex-wrap gap-2">
                                            <template x-for="(att, ai) in msg.attachments" :key="ai">
                                                <div class="relative group">
                                                    <template x-if="att.type === 'image'">
                                                        <img :src="att.preview || att.signed_url" loading="lazy"
                                                            class="h-14 w-14 object-cover rounded-lg border border-white/10" />
                                                    </template>
                                                    <template x-if="att.type === 'video'">
                                                        <div
                                                            class="relative h-14 w-14 rounded-lg overflow-hidden border border-white/10 bg-black">
                                                            <template
                                                                x-if="att.preview && !att.preview.startsWith('blob:video/') && !att.preview.endsWith('.mp4')">
                                                                <img :src="att.preview" loading="lazy"
                                                                    class="h-full w-full object-cover" />
                                                            </template>
                                                            <template
                                                                x-if="!att.preview || att.preview.startsWith('blob:video/') || att.preview.endsWith('.mp4')">
                                                                <video :src="att.preview || att.signed_url"
                                                                    preload="none" muted
                                                                    class="h-full w-full object-cover"></video>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    <div x-show="att.type === 'audio'"
                                                        class="h-14 w-14 rounded-lg border border-white/10 bg-slate-950/70 flex items-center justify-center">
                                                        <span
                                                            class="material-symbols-outlined text-slate-300">graphic_eq</span>
                                                    </div>
                                                    <span
                                                        class="absolute bottom-0 left-0 right-0 bg-black/60 text-[8px] text-center text-slate-300 py-0.5 rounded-b-lg font-label uppercase"
                                                        x-text="att.role === 'first_frame' ? '首帧' : att.role === 'last_frame' ? '尾帧' : att.role === 'reference_image' ? '参考图' : att.role === 'reference_video' ? '参考视频' : att.role === 'reference_audio' ? '参考音频' : ''"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                                <span class="font-label text-[9px] text-slate-600 uppercase" x-text="msg.time"></span>
                            </div>
                        </template>
                        <template x-if="msg.role === 'system'">
                            <div class="max-w-[85%] space-y-2">
                                <div class="glass-panel p-4 rounded-xl rounded-tl-none border-r-2 border-tertiary">
                                    <p class="text-sm text-on-surface-variant leading-relaxed" x-html="msg.text"></p>
                                    <!-- 只要有任务ID就显示：在消息气泡内显示 prompt 摘要 + meta -->
                                    <template x-if="msg.taskId">
                                        <div class="mt-2 space-y-1">
                                            <!-- 第一行：图标 + Prompt + 核心参数 -->
                                            <div class="flex items-center gap-2 flex-wrap">
                                                <span
                                                    class="material-symbols-outlined text-sm text-primary shrink-0">smart_display</span>
                                                <span class="text-xs text-indigo-200 truncate max-w-[180px]"
                                                    x-text="msg.promptSnippet || '视频已生成'"></span>
                                                <div
                                                    class="flex items-center text-[10px] text-slate-500 divide-x divide-white/10">
                                                    <span class="px-1.5 first:pl-0" x-text="msg.modelName || ''"></span>
                                                    <template x-if="msg.duration"><span class="px-1.5"
                                                            x-text="msg.duration + 's'"></span></template>
                                                    <template x-if="msg.resolution"><span class="px-1.5"
                                                            x-text="msg.resolution"></span></template>
                                                </div>
                                            </div>
                                            <!-- 第二行：任务 ID -->
                                            <div class="flex items-center gap-1.5 pl-6">
                                                <span class="text-[9px] text-slate-600 font-label uppercase">Task
                                                    ID:</span>
                                                <span class="text-[9px] text-slate-500 font-mono"
                                                    x-text="msg.taskId"></span>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="msg.taskId && activeTasks[msg.taskId]">
                                        <div class="mt-3 rounded-lg border border-white/10 bg-slate-950/40 p-3">
                                            <div class="flex items-center justify-between gap-3">
                                                <div class="flex items-center gap-2.5">
                                                    <!-- 转圈 Spinner -->
                                                    <svg class="animate-spin h-4 w-4 text-primary shrink-0"
                                                        xmlns="http://www.w3.org/2000/svg" fill="none"
                                                        viewBox="0 0 24 24">
                                                        <circle class="opacity-20" cx="12" cy="12" r="10"
                                                            stroke="currentColor" stroke-width="3"></circle>
                                                        <path class="opacity-80" fill="currentColor"
                                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                                    </svg>
                                                    <div>
                                                        <p class="text-xs font-bold text-indigo-100"
                                                            x-text="activeTasks[msg.taskId].statusText"></p>
                                                        <p class="text-[10px] text-slate-400 mt-0.5"
                                                            x-text="activeTasks[msg.taskId].pollingStatus || '轮询中...' ">
                                                        </p>
                                                    </div>
                                                </div>
                                                <button
                                                    @click="activeTasks[msg.taskId].volcanoStatus !== 'running' && !activeTasks[msg.taskId].cancelling && cancelTask(msg.taskId)"
                                                    :disabled="activeTasks[msg.taskId].volcanoStatus === 'running' || activeTasks[msg.taskId].cancelling"
                                                    :title="activeTasks[msg.taskId].volcanoStatus === 'running' ? '任务生成中，服务端不支持中断' : activeTasks[msg.taskId].cancelling ? '正在取消...' : '取消任务'"
                                                    :class="activeTasks[msg.taskId].volcanoStatus === 'running' || activeTasks[msg.taskId].cancelling
                                                        ? 'border-slate-600/40 bg-slate-700/20 text-slate-500 cursor-not-allowed'
                                                        : 'border-red-400/40 bg-red-500/10 text-red-300 hover:bg-red-500/20 cursor-pointer'"
                                                    class="h-7 px-2.5 rounded-md border text-[10px] font-label uppercase tracking-wide transition-colors disabled:opacity-40">
                                                    <span
                                                        x-show="activeTasks[msg.taskId].volcanoStatus !== 'running' && !activeTasks[msg.taskId].cancelling">取消任务</span>
                                                    <span x-show="activeTasks[msg.taskId].cancelling"
                                                        class="flex items-center gap-1">
                                                        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24"
                                                            fill="none">
                                                            <circle class="opacity-25" cx="12" cy="12" r="10"
                                                                stroke="currentColor" stroke-width="4" />
                                                            <path class="opacity-75" fill="currentColor"
                                                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                        </svg>
                                                        取消中...
                                                    </span>
                                                    <span
                                                        x-show="activeTasks[msg.taskId].volcanoStatus === 'running' && !activeTasks[msg.taskId].cancelling"
                                                        class="flex items-center gap-1">
                                                        <span class="material-symbols-outlined text-[11px]">lock</span>
                                                        生成中·无法取消
                                                    </span>
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="msg.videoUrl">
                                        <!-- 视频缩略图，点击弹窗播放 -->
                                        <div
                                            class="mt-3 rounded-xl overflow-hidden border border-white/10 bg-black min-h-[200px]">
                                            <div class="relative group cursor-pointer"
                                                @click="openVideoModal(msg.videoUrl)">
                                                <video :src="msg.videoUrl + '#t=0.1'" :class="[
                                                        'w-full max-h-64 object-contain bg-black/50 block',
                                                        msg.ratio === '16:9' ? 'aspect-video' : 
                                                        msg.ratio === '9:16' ? 'aspect-[9/16]' : 
                                                        msg.ratio === '1:1' ? 'aspect-square' : 'aspect-video'
                                                    ]" preload="metadata" muted>
                                                </video>
                                                <!-- 播放遮罩 -->
                                                <div
                                                    class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <div
                                                        class="h-12 w-12 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
                                                        <span
                                                            class="material-symbols-outlined text-white text-2xl">play_arrow</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <span class="font-label text-[9px] text-slate-600 uppercase" x-text="msg.time"></span>
                            </div>
                        </template>
                    </div>
                </template>
            </div>



            <!-- ===== Advanced Configuration (重设计，pill button 风格，折叠面板) ===== -->
            <div class="border-t border-white/5 bg-black/20">
                <!-- 首尾帧上传区 (移至此处，只要 enableFrames 为 true 就显示) -->
                <div x-show="enableFrames" x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 -translate-y-2"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    class="px-5 py-4 border-b border-white/5 bg-indigo-500/5">
                    <div class="flex gap-4 items-center">
                        <div class="flex gap-3 shrink-0">
                            <!-- 首帧 -->
                            <div
                                class="w-28 h-20 relative rounded-xl border border-white/10 bg-slate-950/40 overflow-hidden shadow-xl">
                                <template x-if="!firstFrame">
                                    <label
                                        class="absolute inset-0 border-2 border-dashed border-indigo-500/20 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500/40 transition-all group">
                                        <span
                                            class="material-symbols-outlined text-indigo-400/50 group-hover:text-indigo-400 text-xl">first_page</span>
                                        <span
                                            class="text-[10px] font-label text-slate-500 uppercase group-hover:text-indigo-200 transition-colors mt-1">上传首帧</span>
                                        <input type="file" accept="image/*" @change="handleFirstFrameSelect($event)"
                                            class="hidden" />
                                    </label>
                                </template>
                                <template x-if="firstFrame">
                                    <div class="absolute inset-0 group">
                                        <img :src="firstFrame?.preview" class="w-full h-full object-contain" />
                                        <div
                                            class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <button @click.stop="removeFirstFrame()"
                                                class="h-8 w-8 bg-error text-on-error rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-lg">
                                                <span class="material-symbols-outlined text-sm">close</span>
                                            </button>
                                        </div>
                                        <span
                                            class="absolute bottom-1 left-1 px-1.5 py-0.5 bg-primary/90 text-on-primary text-[9px] rounded font-bold uppercase tracking-wider">First
                                            Frame</span>
                                    </div>
                                </template>
                            </div>
                            <!-- 尾帧 -->
                            <div
                                class="w-28 h-20 relative rounded-xl border border-white/10 bg-slate-950/40 overflow-hidden shadow-xl">
                                <template x-if="!lastFrame">
                                    <label
                                        class="absolute inset-0 border-2 border-dashed border-indigo-500/20 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500/40 transition-all group">
                                        <span
                                            class="material-symbols-outlined text-indigo-400/50 group-hover:text-indigo-400 text-xl">last_page</span>
                                        <span
                                            class="text-[10px] font-label text-slate-500 uppercase group-hover:text-indigo-200 transition-colors mt-1">上传尾帧</span>
                                        <input type="file" accept="image/*" @change="handleLastFrameSelect($event)"
                                            class="hidden" />
                                    </label>
                                </template>
                                <template x-if="lastFrame">
                                    <div class="absolute inset-0 group">
                                        <img :src="lastFrame?.preview" class="w-full h-full object-contain" />
                                        <div
                                            class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <button @click.stop="removeLastFrame()"
                                                class="h-8 w-8 bg-error text-on-error rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-lg">
                                                <span class="material-symbols-outlined text-sm">close</span>
                                            </button>
                                        </div>
                                        <span
                                            class="absolute bottom-1 left-1 px-1.5 py-0.5 bg-tertiary/90 text-on-tertiary text-[9px] rounded font-bold uppercase tracking-wider">Last
                                            Frame</span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <h4 class="text-xs font-bold text-indigo-200 uppercase tracking-wider">首尾帧控制</h4>
                            <p class="text-[11px] text-slate-500 max-w-[200px]">上传图片以精确控制视频的起始与结束画面，实现更完美的转场。</p>
                        </div>
                    </div>
                </div>

                <!-- 顶部栏：主配置 + 展开/折叠 -->
                <div class="px-5 py-3.5 flex flex-wrap items-center gap-4">
                    <!-- 标题 + 折叠按钮 -->
                    <button @click="showAdvancedConfig = !showAdvancedConfig"
                        class="flex items-center gap-2 text-xs font-label uppercase tracking-widest text-slate-400 hover:text-indigo-300 transition-colors shrink-0">
                        <span class="material-symbols-outlined text-lg">tune</span>
                        参数配置
                        <span class="material-symbols-outlined text-sm transition-transform duration-200"
                            :class="showAdvancedConfig ? 'rotate-180' : ''">expand_more</span>
                    </button>
                    <div class="h-4 w-px bg-white/10 shrink-0"></div>

                    <!-- 视频比例 pill buttons -->
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider shrink-0">比例</span>
                        <div class="flex gap-1.5">
                            <template x-for="r in currentModelConfig?.ratios || []" :key="r">
                                <button @click="params.ratio = r" :class="params.ratio === r
                                        ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40'
                                        : 'text-slate-500 border-white/8 hover:border-white/20 hover:text-slate-300'"
                                    class="px-2.5 py-1 text-[11px] font-label border rounded-md transition-all min-w-[36px]"
                                    x-text="r"></button>
                            </template>
                        </div>
                    </div>
                    <div class="h-4 w-px bg-white/10 shrink-0"></div>

                    <!-- 时长 pill buttons -->
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider shrink-0">时长</span>
                        <div class="flex gap-1.5">
                            <template x-for="d in currentModelConfig?.durations || []" :key="d">
                                <button @click="params.duration = d" :class="params.duration === d
                                        ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40'
                                        : 'text-slate-500 border-white/8 hover:border-white/20 hover:text-slate-300'"
                                    class="px-2.5 py-1 text-[11px] font-label border rounded-md transition-all min-w-[32px]"
                                    x-text="d + 's'"></button>
                            </template>
                        </div>
                    </div>
                    <div class="h-4 w-px bg-white/10 shrink-0"></div>

                    <!-- 分辨率 pill buttons (seedance-1.5-pro) -->
                    <div x-show="selectedModel === 'seedance-1.5-pro'" class="flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider shrink-0">分辨率</span>
                        <div class="flex gap-1.5">
                            <template x-for="res in ['480p','720p','1080p']" :key="res">
                                <button @click="params.resolution = res" :disabled="params.draft" :class="params.resolution === res
                                        ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40'
                                        : 'text-slate-500 border-white/8 hover:border-white/20 hover:text-slate-300'"
                                    class="px-2.5 py-1 text-[11px] font-label border rounded-md transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                                    x-text="res"></button>
                            </template>
                        </div>
                        <div class="h-4 w-px bg-white/10 shrink-0 ml-1"></div>
                    </div>

                    <!-- 分辨率 pill buttons (已为 2.0 隐藏，因为 2.0 不支持显式指定分辨率，由模型自动决定最佳画质) -->

                    <!-- 生成音频 mini toggle -->
                    <div x-show="currentModelConfig?.has_audio" class="flex items-center gap-2 shrink-0">
                        <button @click="params.generate_audio = !params.generate_audio"
                            :class="params.generate_audio ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40' : 'text-slate-500 border-white/8 hover:border-white/20'"
                            class="flex items-center gap-1.5 px-2.5 py-1 text-[11px] font-label border rounded-md transition-all">
                            <span class="material-symbols-outlined text-sm">graphic_eq</span>
                            音频
                        </button>
                    </div>

                    <!-- 水印 mini toggle -->
                    <div class="flex items-center gap-2 shrink-0">
                        <button @click="params.watermark = !params.watermark"
                            :class="params.watermark ? 'bg-indigo-500/20 text-indigo-300 border-indigo-500/40' : 'text-slate-500 border-white/8 hover:border-white/20'"
                            class="flex items-center gap-1.5 px-2.5 py-1 text-[11px] font-label border rounded-md transition-all">
                            <span class="material-symbols-outlined text-sm">branding_watermark</span>
                            水印
                        </button>
                    </div>

                    <!-- 首尾帧 mini toggle -->
                    <div class="flex items-center gap-2 shrink-0 ml-auto">
                        <button @click="toggleFramesEnabled()"
                            :class="enableFrames ? 'bg-indigo-500/30 text-indigo-200 border-indigo-500/60 shadow-[0_0_10px_rgba(99,102,241,0.2)]' : 'text-slate-500 border-white/10 hover:border-white/25'"
                            class="flex items-center gap-1.5 px-3 py-1.5 text-[11px] font-bold border rounded-lg transition-all transform active:scale-95">
                            <span class="material-symbols-outlined text-base">photo_library</span>
                            首尾帧
                        </button>
                    </div>
                </div>

                <!-- 展开区：模型专有参数 (不再包含首尾帧上传) -->
                <div x-show="showAdvancedConfig" x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 -translate-y-1"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-150"
                    x-transition:leave-start="opacity-100 translate-y-0"
                    x-transition:leave-end="opacity-0 -translate-y-1" class="px-5 pb-3">
                    <div class="flex gap-4 items-start">
                        <!-- 模型专有参数 (seedance-1.5-pro) -->
                        <div x-show="selectedModel === 'seedance-1.5-pro'"
                            class="flex-1 grid grid-cols-2 gap-2 p-3 rounded-xl bg-slate-950/40 border border-white/5">
                            <!-- Service Tier -->
                            <div>
                                <label class="block text-[10px] font-label text-slate-500 uppercase mb-1.5">Service
                                    Tier</label>
                                <select x-model="params.service_tier" :disabled="params.draft"
                                    class="w-full bg-slate-950/60 border border-white/10 rounded-lg px-2 py-1.5 text-xs text-indigo-100 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <option value="default">default</option>

                                            <div class="w-full h-full bg-black relative">
                                                <video :src="item.thumbnail_signed_url || item.signed_url"
                                                    class="w-full h-full object-cover" muted preload="none"></video>
                                                <span
                                                    class="absolute inset-0 flex items-center justify-center bg-black/20 material-symbols-outlined text-white text-[1.5rem] group-hover:bg-black/0 transition-all">play_circle</span>
                                            </div>
                                        </template>
                                        <template x-if="item.file_type === 'audio'">
                                            <div
                                                class="w-full h-full bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center">
                                                <span
                                                    class="material-symbols-outlined text-slate-400 group-hover:text-indigo-300 text-3xl transition-colors">graphic_eq</span>
                                            </div>
                                        </template>

                                        <!-- Badges -->
                                        <div class="absolute top-1.5 left-1.5 flex flex-col gap-1">
                                            <span x-show="item.file_type === 'video'"
                                                class="bg-black/60 backdrop-blur-md text-[8px] font-bold px-1.5 py-0.5 rounded text-primary"
                                                x-text="formatMediaResolution(item)"></span>
                                            <span x-show="item.file_type === 'video' || item.file_type === 'audio'"
                                                class="bg-black/60 backdrop-blur-md text-[8px] font-bold px-1.5 py-0.5 rounded text-white"
                                                x-text="formatMediaDuration(item)"></span>
                                        </div>

                                        <!-- Selection Indicator -->
                                        <div class="absolute top-1.5 right-1.5 h-5 w-5 rounded-full border-2 flex items-center justify-center transition-all bg-black/20 backdrop-blur-sm"
                                            :class="selectedLibraryItems.some(i => i.id === item.id) ? 'bg-emerald-500 border-emerald-500' : 'border-white/30'">
                                            <span class="material-symbols-outlined text-white text-sm"
                                                x-show="selectedLibraryItems.some(i => i.id === item.id)">check</span>
                                        </div>
                                    </div>

                                    <!-- Label -->
                                    <div class="h-8 bg-slate-950/80 px-2 flex items-center border-t border-white/5">
                                        <span class="text-[9px] font-label text-slate-400 truncate w-full"
                                            x-text="item.name"></span>
                                    </div>

                                    <!-- Overlay Source -->
                                    <div
                                        class="absolute bottom-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <span
                                            class="text-[8px] px-1 bg-white/10 backdrop-blur-md rounded text-slate-500 uppercase"
                                            x-text="item.source_type === 'generated' ? '生成' : '上传'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div
                        class="px-6 py-4 border-t border-white/10 bg-slate-900/50 flex items-center justify-between shrink-0">
                        <!-- Pagination -->
                        <div class="flex items-center gap-3">
                            <button @click="prevPage()" :disabled="currentPage <= 1"
                                class="h-8 px-3 rounded-lg bg-white/5 text-[10px] text-slate-400 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px]">chevron_left</span> 上一页
                            </button>
                            <span
                                class="text-[10px] text-slate-500 font-label bg-black/20 py-1.5 px-3 rounded-lg border border-white/5">
                                <span class="text-slate-400">PAGE</span> <span x-text="currentPage"
                                    class="text-indigo-300 font-bold ml-0.5"></span>
                            </span>
                            <button @click="nextPage()" :disabled="!hasMore"
                                class="h-8 px-3 rounded-lg bg-white/5 text-[10px] text-slate-400 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center gap-1">
                                下一页 <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                            </button>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center gap-3">
                            <button @click="showMediaLibraryPicker = false"
                                class="h-9 px-5 rounded-lg text-xs font-bold text-slate-400 hover:text-white hover:bg-white/5 transition-all">
                                取消
                            </button>
                            <button @click="addSelectedReferencesFromLibrary()"
                                :disabled="selectedLibraryItems.length === 0"
                                class="h-9 px-6 rounded-lg bg-primary text-on-primary-container text-xs font-bold shadow-lg shadow-primary/20 disabled:opacity-30 disabled:cursor-not-allowed hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm">add_circle</span>
                                <span
                                    x-text="`确认添加 ${selectedLibraryItems.length > 0 ? '(' + selectedLibraryItems.length + ')' : ''}`"></span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Custom Confirmation Modal -->
            <div x-show="confirmModal.show" class="fixed inset-0 z-[200] flex items-center justify-center p-4"
                x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" style="display: none;">
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm"></div>
                <div @click.outside="confirmModal.resolve(false); confirmModal.show = false"
                    class="relative bg-surface-container-high border border-white/10 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl transform transition-all"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 scale-95 translate-y-4"
                    x-transition:enter-end="opacity-100 scale-100 translate-y-0">
                    <div class="p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div
                                class="h-10 w-10 rounded-full bg-amber-500/15 flex items-center justify-center text-amber-500">
                                <span class="material-symbols-outlined">warning</span>
                            </div>
                            <h3 class="text-indigo-50 font-headline font-bold text-lg" x-text="confirmModal.title"></h3>
                        </div>
                        <div class="text-slate-300 text-sm leading-relaxed" x-html="confirmModal.message"></div>
                    </div>
                    <div class="px-6 py-4 bg-slate-900/50 flex items-center justify-end gap-3">
                        <button @click="confirmModal.resolve(false); confirmModal.show = false"
                            class="h-9 px-5 rounded-lg text-xs font-bold text-slate-400 hover:text-white hover:bg-white/5 transition-all"
                            x-text="confirmModal.cancelText || '取消'">
                        </button>
                        <button @click="confirmModal.resolve(true); confirmModal.show = false"
                            class="h-9 px-6 rounded-lg bg-primary text-on-primary-container text-xs font-bold shadow-lg shadow-indigo-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all"
                            x-text="confirmModal.confirmText || '确定'">
                        </button>
                    </div>
                </div>
            </div>

        </section>

    </div>
</template>
