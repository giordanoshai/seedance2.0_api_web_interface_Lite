            <template x-if="currentView === 'history'">
                <section class="flex-1 p-8 overflow-y-auto">
                    <div class="max-w-4xl mx-auto space-y-4">
                        <template x-if="!taskList.length">
                            <div class="text-center py-20">
                                <span class="material-symbols-outlined text-5xl text-slate-700">inventory_2</span>
                                <p class="text-sm text-slate-500 mt-4 font-label">暂无历史任务</p>
                            </div>
                        </template>
                        <template x-for="task in taskList" :key="task.id">
                            <div class="bg-surface-container-low border border-white/5 rounded-xl p-6 hover:border-primary/20 transition-all fade-in-up">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1 min-w-0">
                                        <p class="text-sm text-indigo-100 truncate" x-text="task.prompt || '(无文字描述)'"></p>
                                        <div class="flex items-center gap-3 mt-2">
                                            <span class="text-[10px] font-label uppercase tracking-wider" :class="{
                                                    'text-green-400': task.status === 'succeeded',
                                                    'text-yellow-400': task.status === 'running' || task.status === 'queued' || task.status === 'processing',
                                                    'text-red-400': task.status === 'failed',
                                                    'text-slate-500': task.status === 'cancelled' || task.status === 'expired',
                                                }" x-text="task.status"></span>
                                            <span class="text-[10px] text-slate-600" x-text="task.model"></span>
                                            <span class="text-[10px] text-slate-600" x-text="new Date(task.created_at).toLocaleString('zh-CN')"></span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2 ml-4">
                                        <button x-show="task.status === 'succeeded'" @click="playVideo(task)" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors">
                                            <span class="material-symbols-outlined">play_circle</span>
                                        </button>
                                        <button @click="deleteTask(task.id)" class="p-2 text-slate-500 hover:text-error hover:bg-error/10 rounded-lg transition-colors">
                                            <span class="material-symbols-outlined text-sm">delete</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </template>
